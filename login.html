<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | منصة نِحرير</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --dark: #0c2340; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .auth-container { background: white; width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid var(--gold); }
        .logo-text { font-family: 'Amiri', serif; font-size: 2.5rem; color: var(--dark); margin-bottom: 10px; font-weight: bold; }
        
        h2 { font-size: 1.2rem; color: #555; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-primary { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 10px; }
        .btn-primary:hover { background: var(--gold); color: var(--dark); }
        
        .toggle-link { margin-top: 20px; font-size: 0.9rem; color: var(--dark); cursor: pointer; text-decoration: underline; }
        .error-msg { color: #d32f2f; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-text">نِحرير</div>
    <h2 id="pageTitle">تسجيل دخول الباحثين</h2>

    <div id="authForm">
        <!-- يظهر حقل الاسم فقط عند إنشاء حساب جديد -->
        <input type="text" id="userName" placeholder="الاسم الكامل" style="display: none;">
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="userPass" placeholder="كلمة المرور">
        
        <div id="errorMessage" class="error-msg"></div>
        
        <button class="btn-primary" id="mainBtn" onclick="processAuth()">دخول</button>
        
        <div class="toggle-link" id="toggleText" onclick="toggleAuthMode()">ليس لديك حساب؟ أنشئ حساباً جديداً</div>
    </div>
    
    <a href="index.html" style="display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.8rem;">العودة للرئيسية</a>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('userName').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('pageTitle').innerText = isLoginMode ? 'تسجيل دخول الباحثين' : 'إنشاء حساب باحث جديد';
        document.getElementById('mainBtn').innerText = isLoginMode ? 'دخول' : 'إنشاء الحساب';
        document.getElementById('toggleText').innerText = isLoginMode ? 'ليس لديك حساب؟ أنشئ حساباً جديداً' : 'لديك حساب بالفعل؟ سجل دخولك';
    }

    async function processAuth() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        const name = document.getElementById('userName').value;
        const errDiv = document.getElementById('errorMessage');

        errDiv.style.display = 'none';

        try {
            if (isLoginMode) {
                // عملية تسجيل الدخول
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                checkUserStatus(userCredential.user.uid);
            } else {
                // عملية إنشاء حساب جديد
                if(!name) throw new Error("يرجى كتابة الاسم الكامل");
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                
                // حفظ بيانات المستخدم في Firestore بحالة "pending"
                await db.collection('users').doc(userCredential.user.uid).set({
                    name: name,
                    email: email,
                    status: 'pending', // بانتظار موافقتك يا مدير
                    role: 'student',
                    createdAt: new Date()
                });
                
                alert("تم إنشاء الحساب بنجاح! يرجى انتظار موافقة الإدارة لتتمكن من الدخول.");
                location.reload();
            }
        } catch (error) {
            errDiv.innerText = error.message;
            errDiv.style.display = 'block';
        }
    }

    async function checkUserStatus(uid) {
        const userDoc = await db.collection('users').doc(uid).get();
        if (userDoc.exists) {
            const userData = userDoc.data();
            if (userData.status === 'active') {
                // إذا كان مفعلاً، يتوجه للمكتبة
                window.location.href = 'dashboard.html';
            } else {
                alert("عذراً، حسابك لا يزال قيد المراجعة من قبل المدير.");
                auth.signOut();
            }
        }
    }
</script>
</body>
</html>

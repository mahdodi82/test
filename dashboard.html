<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة نِحرير | القمة العلمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #0a192f; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        /* تصميم الهيدر الملكي */
        .header { background: var(--dark); padding: 0 80px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2rem; color: var(--gold); font-weight: bold; padding: 20px 0; }
        .nav-links { display: flex; list-style: none; margin: 0; }
        .nav-links li { padding: 25px 20px; color: #fff; cursor: pointer; font-weight: 500; transition: 0.3s; border-bottom: 4px solid transparent; }
        .nav-links li:hover, .nav-links li.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255,255,255,0.05); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .tab-panel { display: none; animation: slideUp 0.4s ease; }
        .tab-panel.active { display: block; }

        /* الأقسام (المجلدات) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .folder { background: white; border-radius: 15px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border-top: 5px solid var(--gold); }
        .folder:hover { transform: translateY(-10px); }
        .folder i { font-size: 4rem; color: var(--dark); margin-bottom: 20px; }
        .folder h3 { margin: 0; font-size: 1.4rem; color: var(--dark); }

        /* المواد العلمية */
        .item-card { background: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-right: 8px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .btn-open { background: var(--dark); color: var(--gold); padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 1px solid var(--gold); }

        /* الخبراء */
        .expert-card { background: white; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #eee; }
        .expert-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--gold); margin-bottom: 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">نِحرير</div>
    <ul class="nav-links">
        <li class="active" onclick="switchTab('sec-cats')">1/ الأقسام</li>
        <li onclick="switchTab('sec-books')">2/ الكتب العلمية</li>
        <li onclick="switchTab('sec-res')">3/ الأبحاث</li>
        <li onclick="switchTab('sec-exp')">4/ الخبراء</li>
        <li onclick="switchTab('sec-about')">5/ حول</li>
    </ul>
</header>

<div class="container">
    <!-- 1/ الأقسام -->
    <div id="sec-cats" class="tab-panel active">
        <div id="path-box" style="margin-bottom:20px; display:none;">
            <button onclick="loadCategories('root')" style="background:var(--gold); border:none; padding:10px 20px; cursor:pointer; border-radius:5px;">🏠 العودة للرئيسية</button>
        </div>
        <div id="cat-grid" class="grid"></div>
        <div id="cat-files" style="margin-top:40px;"></div> <!-- لعرض الملفات بداخل القسم -->
    </div>

    <!-- 2/ الكتب -->
    <div id="sec-books" class="tab-panel">
        <div id="books-list"></div>
    </div>

    <!-- 3/ الأبحاث -->
    <div id="sec-res" class="tab-panel">
        <div id="res-list"></div>
    </div>

    <!-- 4/ الخبراء -->
    <div id="sec-exp" class="tab-panel">
        <div id="exp-grid" class="grid"></div>
    </div>

    <!-- 5/ حول -->
    <div id="sec-about" class="tab-panel">
        <div class="folder" style="text-align: right; cursor: default;">
            <h2 style="color:var(--gold)">منصة نِحرير العلمية</h2>
            <p>منصة متخصصة في نشر المعرفة الطبية والتأهيل الحركي تحت إشراف الأخصائي مهدي.</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function switchTab(id) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(id === 'sec-books') loadByType('book', 'books-list');
        if(id === 'sec-res') loadByType('research', 'res-list');
        if(id === 'sec-exp') loadExperts();
    }

    // تحميل الأقسام والمواد بداخلها
    async function loadCategories(parent) {
        const grid = document.getElementById('cat-grid');
        const fileArea = document.getElementById('cat-files');
        grid.innerHTML = "جاري التحميل..."; fileArea.innerHTML = "";
        document.getElementById('path-box').style.display = parent === 'root' ? 'none' : 'block';

        // جلب الأقسام الفرعية
        const catSnap = await db.collection('nihrir_data').where('type', '==', 'category').where('parent', '==', parent).get();
        grid.innerHTML = "";
        catSnap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `<div class="folder" onclick="loadCategories('${d.name}')"><i class="fas fa-folder"></i><h3>${d.name}</h3></div>`;
        });

        // جلب الملفات التي تتبع هذا القسم
        const fileSnap = await db.collection('nihrir_data').where('parent', '==', parent).get();
        fileSnap.forEach(doc => {
            const d = doc.data();
            if(d.type !== 'category') {
                fileArea.innerHTML += `<div class="item-card"><div><strong>${d.name}</strong></div><a href="${d.payload}" target="_blank" class="btn-open">فتح الملف</a></div>`;
            }
        });
    }

    async function loadByType(type, target) {
        const area = document.getElementById(target);
        area.innerHTML = "جاري التحميل...";
        const snap = await db.collection('nihrir_data').where('type', '==', type).get();
        area.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            area.innerHTML += `<div class="item-card"><div><strong>${d.name}</strong><br><small>القسم: ${d.parent}</small></div><a href="${d.payload}" target="_blank" class="btn-open">مشاهدة</a></div>`;
        });
    }

    async function loadExperts() {
        const grid = document.getElementById('exp-grid');
        grid.innerHTML = "";
        const snap = await db.collection('experts').get();
        snap.forEach(doc => {
            const e = doc.data();
            grid.innerHTML += `<div class="expert-card"><img src="${e.image}" class="expert-img"><h4>${e.name}</h4><p>${e.spec}</p><a href="mailto:${e.email}" style="color:var(--dark)">تواصل</a></div>`;
        });
    }

    loadCategories('root');
</script>
</body>
</html>

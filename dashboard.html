<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نِحرير العلمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--navy); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; color: var(--gold); font-weight: bold; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 25px; color: white; cursor: pointer; }
        .nav-menu li:hover, .nav-menu li.active { color: var(--gold); }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        
        /* إطار البحث */
        #search-wrapper { display: none; margin-bottom: 30px; animation: fadeIn 0.3s; }
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); font-size: 1.1rem; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 30px 15px; border-radius: 15px; text-align: center; border-top: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        
        .item-row { background: white; padding: 20px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { background: var(--navy); color: var(--gold); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        
        .expert-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .expert-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header class="header">
    <a href="#" class="logo" onclick="location.reload()">نِحرير</a>
    <ul class="nav-menu">
        <li onclick="location.reload()" class="active">الأقسام</li>
        <li onclick="loadModule('book')">الكتب العلمية</li>
        <li onclick="loadModule('research')">الأبحاث والدراسات</li>
        <li onclick="loadExperts()">نخبة الخبراء</li>
        <li onclick="loadAbout()">عن المنصة</li>
    </ul>
</header>

<div class="container">
    <!-- إطار البحث يظهر فقط في الكتب والأبحاث -->
    <div id="search-wrapper">
        <input type="text" id="search-input" class="search-box" placeholder="ابحث عن عنوان أو تخصص..." onkeyup="doSearch()">
    </div>

    <div id="main-view">
        <!-- الواجهة الرئيسية للأقسام -->
        <h2 style="color:var(--navy)">الأقسام الرئيسية</h2>
        <div class="grid">
            <div class="card" onclick="loadByParent('التأهيل الحركي')"><i class="fas fa-running fa-3x"></i><h3>التأهيل الحركي</h3></div>
            <div class="card" onclick="loadByParent('العلاج الطبيعي')"><i class="fas fa-hands-helping fa-3x"></i><h3>العلاج الطبيعي</h3></div>
            <div class="card" onclick="loadByParent('الطب الرياضي')"><i class="fas fa-dumbbell fa-3x"></i><h3>الطب الرياضي</h3></div>
            <div class="card" onclick="loadByParent('طب العظام')"><i class="fas fa-bone fa-3x"></i><h3>طب العظام</h3></div>
            <div class="card" onclick="loadByParent('الطب البديل')"><i class="fas fa-leaf fa-3x"></i><h3>الطب البديل</h3></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // تحميل الكتب أو الأبحاث مع تفعيل إطار البحث
    async function loadModule(type) {
        document.getElementById('search-wrapper').style.display = 'block';
        const view = document.getElementById('main-view');
        view.innerHTML = `<h2 style="color:var(--navy)">تصفح ${type === 'book' ? 'الكتب العلمية' : 'الأبحاث والدراسات'}</h2><div id="results-area"></div>`;
        
        const snap = await db.collection('nihrir_data').where('type', '==', type).get();
        displayItems(snap);
    }

    // تحميل الخبراء (إخفاء البحث)
    async function loadExperts() {
        document.getElementById('search-wrapper').style.display = 'none';
        const view = document.getElementById('main-view');
        view.innerHTML = `<h2 style="color:var(--navy)">نخبة الخبراء والمتخصصين</h2><div class="grid" id="expert-grid"></div>`;
        const snap = await db.collection('experts').get();
        snap.forEach(doc => {
            const e = doc.data();
            document.getElementById('expert-grid').innerHTML += `
                <div class="expert-card">
                    <img src="${e.image}" class="expert-img">
                    <h3>${e.name}</h3>
                    <p style="color:var(--gold)">${e.spec}</p>
                    <a href="mailto:${e.email}" class="btn-action">تواصل الآن</a>
                </div>`;
        });
    }

    // عن المنصة (إخفاء البحث)
    function loadAbout() {
        document.getElementById('search-wrapper').style.display = 'none';
        document.getElementById('main-view').innerHTML = `
            <div class="card" style="max-width:800px; margin:auto; text-align:right; padding:40px;">
                <h2 style="color:var(--navy)">حول منصة نِحرير</h2>
                <p>نِحرير هي بوابة علمية متخصصة في مجالات التأهيل الحركي والطب الرياضي، تهدف لتوفير أحدث المراجع والكتب للباحثين تحت إشراف متخصصين.</p>
                <hr style="border:0.5px solid #eee; margin:20px 0;">
                <p><strong>المشرف العام:</strong> أخصائي التأهيل الحركي مهدي</p>
            </div>`;
    }

    async function loadByParent(p) {
        document.getElementById('search-wrapper').style.display = 'none';
        const view = document.getElementById('main-view');
        view.innerHTML = `<h2>تخصص: ${p}</h2><div id="results-area"></div>`;
        const snap = await db.collection('nihrir_data').where('parent', '==', p).get();
        displayItems(snap);
    }

    function displayItems(snap) {
        const area = document.getElementById('results-area');
        if(snap.empty) { area.innerHTML = "لا يوجد محتوى حالياً."; return; }
        snap.forEach(doc => {
            const d = doc.data();
            area.innerHTML += `
                <div class="item-row searchable">
                    <div><strong>${d.name}</strong> <small>[${d.parent}]</small></div>
                    <a href="${d.payload}" target="_blank" class="btn-action">فتح PDF</a>
                </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.searchable').forEach(i => {
            i.style.display = i.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نِحرير العلمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--navy); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; color: var(--gold); font-weight: bold; text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; color: white; cursor: pointer; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        
        /* تصميم المجلدات */
        .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 50px; }
        .main-folder { background: white; padding: 50px; border-radius: 20px; text-align: center; border-bottom: 8px solid var(--gold); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .main-folder:hover { transform: translateY(-10px); background: #fdfdfd; }
        .main-folder i { font-size: 5rem; color: var(--navy); margin-bottom: 20px; }
        .main-folder h2 { color: var(--navy); font-size: 2rem; }

        .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .spec-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-right: 4px solid var(--gold); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        #search-wrapper { display: none; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); font-size: 1.1rem; }
        .item-row { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--navy); }
        .btn-back { background: var(--navy); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

<header class="header">
    <a href="#" class="logo" onclick="location.reload()">نِحرير</a>
    <ul class="nav-menu">
        <li onclick="location.reload()">الرئيسية</li>
        <li onclick="loadModule('book')">الكتب</li>
        <li onclick="loadModule('research')">الأبحاث</li>
        <li onclick="loadAbout()">عن المنصة</li>
    </ul>
</header>

<div class="container">
    <div id="search-wrapper"><input type="text" id="search-input" class="search-box" placeholder="ابحث هنا..." onkeyup="doSearch()"></div>
    <div id="main-view">
        <!-- المجلدات الرئيسية -->
        <div class="folder-grid">
            <div class="main-folder" onclick="openFolder('medical_folder', 'الاختصاصات الطبية')">
                <i class="fas fa-folder-open"></i>
                <h2>الاختصاصات الطبية</h2>
                <p>تشمل العظام، القلب، الجراحة، والأشعة وغيرها</p>
            </div>
            <div class="main-folder" onclick="openFolder('para_folder', 'الاختصاصات شبه الطبية')">
                <i class="fas fa-folder-open" style="color: #2ecc71;"></i>
                <h2>الاختصاصات شبه الطبية</h2>
                <p>تشمل التأهيل، العلاج الطبيعي، التمريض، والتغذية</p>
            </div>
        </div>
    </div>
</div>

<script>
    // تهيئة Firebase (نفس الإعدادات السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // فتح مجلد (طبي أو شبه طبي) لعرض التخصصات التابعة له
    function openFolder(folderKey, folderName) {
        const view = document.getElementById('main-view');
        let specs = [];
        if(folderKey === 'medical_folder') {
            specs = ["طب العظام", "طب القلب", "طب الأعصاب", "طب الأطفال", "الجراحة العامة", "الأشعة والتشخيص", "الطب الرياضي", "طب الطوارئ"];
        } else {
            specs = ["التأهيل الحركي", "العلاج الطبيعي", "التمريض", "التغذية العلاجية", "تقويم الأعضاء", "علاج النطق", "الطب البديل"];
        }

        view.innerHTML = `<button class="btn-back" onclick="location.reload()">← العودة للمجلدات</button> <h1>${folderName}</h1><div class="spec-grid" id="spec-list"></div>`;
        
        specs.forEach(s => {
            document.getElementById('spec-list').innerHTML += `<div class="spec-card" onclick="loadBySpec('${s}')"><h3>${s}</h3></div>`;
        });
    }

    // الدخول لكل اختصاص على حدة
    async function loadBySpec(spec) {
        document.getElementById('search-wrapper').style.display = 'none';
        const view = document.getElementById('main-view');
        view.innerHTML = `<button class="btn-back" onclick="location.reload()">← العودة للرئيسية</button> <h2>اختصاص: ${spec}</h2><div id="results"></div>`;
        const snap = await db.collection('nihrir_data').where('parent', '==', spec).get();
        render(snap);
    }

    // محرك البحث (يظهر فقط في الكتب والأبحاث العامة)
    async function loadModule(type) {
        document.getElementById('search-wrapper').style.display = 'block';
        const view = document.getElementById('main-view');
        view.innerHTML = `<h2>تصفح ${type === 'book' ? 'الكتب' : 'الأبحاث'}</h2><div id="results"></div>`;
        const snap = await db.collection('nihrir_data').where('type', '==', type).get();
        render(snap);
    }

    function render(snap) {
        const res = document.getElementById('results');
        if(snap.empty) { res.innerHTML = "لا يوجد محتوى حالياً."; return; }
        snap.forEach(doc => {
            const d = doc.data();
            res.innerHTML += `<div class="item-row searchable"><div><strong>${d.name}</strong></div><a href="${d.payload}" target="_blank" style="color:var(--gold)">فتح PDF</a></div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.searchable').forEach(i => i.style.display = i.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }
</script>
</body>
</html>

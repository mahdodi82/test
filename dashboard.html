<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المكتبة الرقمية | نِحرير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #0c2340; --gold: #c5a059; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--dark); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        
        /* تصميم البطاقات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        
        .file-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; border-right: 5px solid var(--gold); }
        .btn-back { background: var(--gold); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        
        /* تواصل مع الخبراء */
        .expert-card { background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .expert-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="window.location.href='index.html'" style="color:var(--gold); background:none; border:none; cursor:pointer;">← الرئيسية</button>
    <h2>مكتبة نِحرير العلمية</h2>
    <div></div>
</div>

<div class="container">
    <div id="navigationArea">
        <button class="btn-back" id="backBtn" onclick="goBack()" style="display:none;">العودة للقسم السابق</button>
        <h3 id="currentPath">الرئيسية</h3>
    </div>

    <!-- منطقة عرض الأقسام والملفات -->
    <div id="displayGrid" class="grid"></div>
    <div id="filesList" style="margin-top:20px;"></div>

    <hr style="margin: 50px 0; opacity: 0.2;">
    
    <h3>تواصل مع الخبراء</h3>
    <div id="expertsDisplay"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let pathStack = ["root"];

    // الوظيفة الأساسية لجلب البيانات
    async function loadContent(parentName) {
        const grid = document.getElementById('displayGrid');
        const list = document.getElementById('filesList');
        grid.innerHTML = 'جاري التحميل...';
        list.innerHTML = '';

        document.getElementById('backBtn').style.display = parentName === "root" ? "none" : "block";
        document.getElementById('currentPath').innerText = parentName === "root" ? "الرئيسية" : "قسم: " + parentName;

        const snap = await db.collection('nihrir_data').where('parent', '==', parentName).get();
        
        let gridHTML = '';
        let listHTML = '';

        snap.forEach(doc => {
            const item = doc.data();
            if(item.type === 'category') {
                gridHTML += `
                    <div class="card" onclick="navigateTo('${item.name}')">
                        <img src="${item.payload || 'https://via.placeholder.com/300x150?text=Category'}">
                        <div class="card-body"><h4>${item.name}</h4></div>
                    </div>`;
            } else {
                listHTML += `
                    <div class="file-item">
                        <span><i class="fas fa-file-pdf"></i> ${item.name}</span>
                        <a href="${item.payload}" target="_blank" style="text-decoration:none; color:var(--dark); font-weight:bold;">فتح المادة</a>
                    </div>`;
            }
        });

        grid.innerHTML = gridHTML;
        list.innerHTML = listHTML;
        if(!gridHTML && !listHTML) grid.innerHTML = "<p>لا توجد محتويات هنا بعد.</p>";
    }

    function navigateTo(name) {
        pathStack.push(name);
        loadContent(name);
    }

    function goBack() {
        pathStack.pop();
        loadContent(pathStack[pathStack.length - 1]);
    }

    // جلب الخبراء
    db.collection('experts').onSnapshot(snap => {
        let h = '';
        snap.forEach(doc => {
            const ex = doc.data();
            h += `
                <div class="expert-card">
                    <img src="${ex.image || 'https://via.placeholder.com/60'}" class="expert-img">
                    <div>
                        <h4 style="margin:0">${ex.name}</h4>
                        <small>${ex.spec}</small><br>
                        <a href="mailto:${ex.email}" style="font-size:12px; color:var(--gold)">${ex.email}</a>
                    </div>
                </div>`;
        });
        document.getElementById('expertsDisplay').innerHTML = h;
    });

    // التشغيل الأول
    loadContent("root");
</script>
</body>
</html>

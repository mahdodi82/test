<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نِحرير | الإدارة المركزية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #0c2340; --bg: #0f1115; --card: #1e2128; }
        body { font-family: 'Segoe UI', Tahoma; background: var(--bg); color: white; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--card); border-left: 1px solid #333; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-right: 260px; padding: 40px; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0d11; border: 1px solid #444; color: white; border-radius: 8px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; width: 100%; padding: 15px; font-size: 1.1rem; }
        .nav-item { padding: 15px; color: #ccc; cursor: pointer; display: block; border-radius: 8px; margin-bottom: 5px; }
        .nav-item.active { background: var(--gold); color: black; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #161b22; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--gold); text-align:center;">نِحرير ADMIN</h2>
    <div class="nav-item active" onclick="showTab('tab-lib', this)">إدارة المكتبة</div>
    <div class="nav-item" onclick="showTab('tab-exp', this)">إدارة الخبراء</div>
    <div class="nav-item" onclick="showTab('tab-users', this)">إدارة الباحثين</div>
</div>

<div class="main">
    <!-- إدارة المكتبة -->
    <div id="tab-lib" class="tab-content">
        <div class="card">
            <h2 style="color:var(--gold)">إضافة مادة علمية</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="lib-type">
                    <option value="book">كتاب علمي</option>
                    <option value="research">بحث أو دراسة</option>
                </select>
                <input type="text" id="lib-name" placeholder="العنوان">
                <select id="lib-parent">
                    <option value="التأهيل الحركي">التأهيل الحركي</option>
                    <option value="العلاج الطبيعي">العلاج الطبيعي</option>
                    <option value="الطب الرياضي">الطب الرياضي</option>
                    <option value="طب العظام">طب العظام</option>
                    <option value="الطب البديل">الطب البديل</option>
                </select>
                <input type="text" id="lib-payload" placeholder="رابط PDF">
            </div>
            <button class="btn-gold" onclick="saveToLib()">نشر في المكتبة</button>
        </div>
        <div class="card"><table id="lib-table"><thead><tr><th>النوع</th><th>الاسم</th><th>التحكم</th></tr></thead><tbody id="lib-body"></tbody></table></div>
    </div>

    <!-- إدارة الخبراء -->
    <div id="tab-exp" class="tab-content" style="display:none">
        <div class="card">
            <h2 style="color:var(--gold)">إضافة خبير</h2>
            <input type="text" id="exp-name" placeholder="الاسم الكامل">
            <input type="text" id="exp-spec" placeholder="التخصص">
            <input type="text" id="exp-img" placeholder="رابط الصورة">
            <input type="text" id="exp-email" placeholder="الإيميل">
            <button class="btn-gold" onclick="saveExpert()">حفظ الخبير</button>
        </div>
        <div class="card"><table id="exp-table"><thead><tr><th>الخبير</th><th>التخصص</th><th>التحكم</th></tr></thead><tbody id="exp-body"></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
    }

    // وظائف الحفظ (Firebase)
    async function saveToLib() {
        await db.collection('nihrir_data').add({
            type: document.getElementById('lib-type').value,
            name: document.getElementById('lib-name').value,
            parent: document.getElementById('lib-parent').value,
            payload: document.getElementById('lib-payload').value
        });
        location.reload();
    }

    async function saveExpert() {
        await db.collection('experts').add({
            name: document.getElementById('exp-name').value,
            spec: document.getElementById('exp-spec').value,
            image: document.getElementById('exp-img').value,
            email: document.getElementById('exp-email').value
        });
        location.reload();
    }

    // استماع للبيانات (Realtime)
    db.collection('nihrir_data').onSnapshot(s => {
        let h = ''; s.forEach(d => { const v = d.data(); h += `<tr><td>${v.type}</td><td>${v.name}</td><td><button onclick="del('nihrir_data','${d.id}')">حذف</button></td></tr>`; });
        document.getElementById('lib-body').innerHTML = h;
    });

    db.collection('experts').onSnapshot(s => {
        let h = ''; s.forEach(d => { const v = d.data(); h += `<tr><td>${v.name}</td><td>${v.spec}</td><td><button onclick="del('experts','${d.id}')">حذف</button></td></tr>`; });
        document.getElementById('exp-body').innerHTML = h;
    });

    async function del(c, id) { if(confirm("حذف؟")) await db.collection(c).doc(id).delete(); }
</script>
</body>
</html>

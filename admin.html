<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نِحرير | الإدارة المركزية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #0c2340; --bg: #0f1115; --card: #1e2128; }
        body { font-family: 'Segoe UI', Tahoma; background: var(--bg); color: white; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--card); border-left: 1px solid #333; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-right: 260px; padding: 40px; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0d11; border: 1px solid #444; color: white; border-radius: 8px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; width: 100%; padding: 15px; font-size: 1.1rem; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #161b22; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #333; }
        th { color: var(--gold); }
        .nav-item { padding: 15px; color: #ccc; cursor: pointer; display: block; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--gold); text-align:center;">نِحرير ADMIN</h2>
    <div class="nav-item active" onclick="showTab('tab-lib')">إدارة المحتوى العلمي</div>
    <div class="nav-item" onclick="showTab('tab-exp')">إدارة الخبراء</div>
    <div class="nav-item" onclick="showTab('tab-users')">إدارة الباحثين</div>
</div>

<div class="main">
    <div id="tab-lib" class="tab-content">
        <div class="card">
            <h2 id="lib-title" style="color:var(--gold)">إضافة/تعديل مادة علمية</h2>
            <input type="hidden" id="lib-id">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="lib-type">
                    <option value="book">كتاب علمي</option>
                    <option value="research">بحث أو مقال</option>
                    <option value="category">قسم فرعي جديد</option>
                </select>
                <input type="text" id="lib-name" placeholder="اسم المادة العلمية">
                
                <!-- القائمة المنسدلة للتخصصات -->
                <select id="lib-parent">
                    <option value="root">القسم الرئيسي (الواجهة)</option>
                    <optgroup label="التخصصات الطبية">
                        <option value="طب العظام">طب العظام</option>
                        <option value="طب القلب">طب القلب</option>
                        <option value="طب الأعصاب">طب الأعصاب</option>
                        <option value="طب الأطفال">طب الأطفال</option>
                        <option value="الجراحة العامة">الجراحة العامة</option>
                        <option value="الطب الباطني">الطب الباطني</option>
                        <option value="الطب الرياضي">الطب الرياضي</option>
                        <option value="طب الطوارئ">طب الطوارئ</option>
                        <option value="الأشعة والتشخيص">الأشعة والتشخيص</option>
                        <option value="أمراض الدم">أمراض الدم</option>
                        <option value="الطب النفسي">الطب النفسي</option>
                        <option value="طب العيون">طب العيون</option>
                        <option value="الجلدية">الجلدية</option>
                        <option value="المسالك البولية">المسالك البولية</option>
                        <option value="الأنف والأذن والحنجرة">الأنف والأذن والحنجرة</option>
                        <option value="النساء والتوليد">النساء والتوليد</option>
                    </optgroup>
                    <optgroup label="التخصصات الشبه طبية">
                        <option value="التأهيل الحركي">التأهيل الحركي</option>
                        <option value="العلاج الطبيعي">العلاج الطبيعي</option>
                        <option value="التمريض">التمريض</option>
                        <option value="التغذية العلاجية">التغذية العلاجية</option>
                        <option value="تقويم الأعضاء">تقويم الأعضاء</option>
                        <option value="علاج النطق">علاج النطق</option>
                        <option value="العلاج الوظيفي">العلاج الوظيفي</option>
                        <option value="التحاليل الطبية">التحاليل الطبية</option>
                        <option value="القبالة">القبالة</option>
                        <option value="التخدير والإنعاش">التخدير والإنعاش</option>
                        <option value="الطب البديل">الطب البديل (الحجامة وغيرها)</option>
                    </optgroup>
                </select>

                <input type="text" id="lib-payload" placeholder="رابط الملف (Google Drive / Direct PDF)">
            </div>
            <button class="btn-gold" onclick="saveToLib()">حفظ ونشر المادة</button>
        </div>

        <div class="card">
            <h3>سجل المحتوى المنشور</h3>
            <table id="lib-table">
                <thead><tr><th>النوع</th><th>الاسم</th><th>التخصص</th><th>التحكم</th></tr></thead>
                <tbody id="lib-body"></tbody>
            </table>
        </div>
    </div>
    <!-- باقي التبويبات (الخبراء والباحثين) تبقى كما هي في الكود الأصلي -->
</div>

<script>
    // الإعدادات ووظائف الحفظ والحذف كما هي، فقط تم تعديل استهداف العناصر
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    async function saveToLib() {
        const id = document.getElementById('lib-id').value;
        const data = {
            type: document.getElementById('lib-type').value,
            name: document.getElementById('lib-name').value,
            parent: document.getElementById('lib-parent').value,
            payload: document.getElementById('lib-payload').value
        };
        if(id) await db.collection('nihrir_data').doc(id).update(data);
        else await db.collection('nihrir_data').add(data);
        alert("تم الحفظ بنجاح"); location.reload();
    }

    db.collection('nihrir_data').onSnapshot(snap => {
        let h = '';
        snap.forEach(doc => {
            const d = doc.data();
            h += `<tr><td>${d.type}</td><td>${d.name}</td><td>${d.parent}</td>
            <td><button onclick="deleteDoc('nihrir_data','${doc.id}')" style="background:red; padding:5px 10px; color:white">حذف</button></td></tr>`;
        });
        document.getElementById('lib-body').innerHTML = h;
    });

    async function deleteDoc(c, id) { if(confirm("هل أنت متأكد من الحذف؟")) await db.collection(c).doc(id).delete(); }
</script>
</body>
</html>

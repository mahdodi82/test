<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نِحرير | الإدارة المركزية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #0c2340; --bg: #0f1115; --card: #1e2128; }
        body { font-family: 'Segoe UI', Tahoma; background: var(--bg); color: white; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--card); border-left: 1px solid #333; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-right: 260px; padding: 40px; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0d11; border: 1px solid #444; color: white; border-radius: 8px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; transition: 0.3s; padding: 10px; }
        .btn-gold { background: var(--gold); color: black; width: 100%; padding: 15px; font-size: 1.1rem; }
        .nav-item { padding: 15px; color: #ccc; cursor: pointer; display: block; border-radius: 8px; margin-bottom: 5px; }
        .nav-item.active { background: var(--gold); color: black; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .bg-medical { background: #2c3e50; color: #3498db; }
        .bg-para { background: #2c3e50; color: #2ecc71; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--gold); text-align:center;">نِحرير ADMIN</h2>
    <div class="nav-item active" onclick="showTab('tab-lib', this)">إدارة المحتوى</div>
    <div class="nav-item" onclick="showTab('tab-exp', this)">إدارة الخبراء</div>
</div>

<div class="main">
    <div id="tab-lib" class="tab-content">
        <div class="card">
            <h2 style="color:var(--gold)">إضافة مادة علمية (كتاب/بحث)</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="lib-type">
                    <option value="book">كتاب علمي</option>
                    <option value="research">بحث أو دراسة</option>
                </select>
                <input type="text" id="lib-name" placeholder="عنوان المادة">
                
                <select id="lib-parent">
                    <optgroup label="الاختصاصات الطبية">
                        <option value="طب العظام">طب العظام</option>
                        <option value="طب القلب">طب القلب</option>
                        <option value="طب الأعصاب">طب الأعصاب</option>
                        <option value="طب الأطفال">طب الأطفال</option>
                        <option value="الجراحة العامة">الجراحة العامة</option>
                        <option value="الأشعة والتشخيص">الأشعة والتشخيص</option>
                        <option value="الطب الرياضي">الطب الرياضي</option>
                        <option value="طب الطوارئ">طب الطوارئ</option>
                        <option value="الطب النفسي">الطب النفسي</option>
                    </optgroup>
                    <optgroup label="الاختصاصات شبه الطبية">
                        <option value="التأهيل الحركي">التأهيل الحركي</option>
                        <option value="العلاج الطبيعي">العلاج الطبيعي</option>
                        <option value="التمريض">التمريض</option>
                        <option value="التغذية العلاجية">التغذية العلاجية</option>
                        <option value="تقويم الأعضاء">تقويم الأعضاء</option>
                        <option value="علاج النطق">علاج النطق</option>
                        <option value="التحاليل الطبية">التحاليل الطبية</option>
                        <option value="الطب البديل">الطب البديل</option>
                    </optgroup>
                </select>
                <input type="text" id="lib-payload" placeholder="رابط الملف PDF">
            </div>
            <button class="btn-gold" onclick="saveToLib()">نشر المادة</button>
        </div>

        <div class="card">
            <h3>المواد المنشورة</h3>
            <table id="lib-table">
                <thead><tr><th>النوع</th><th>الاسم</th><th>الاختصاص</th><th>التحكم</th></tr></thead>
                <tbody id="lib-body"></tbody>
            </table>
        </div>
    </div>
    <!-- قسم الخبراء يبقى كما في الكود السابق -->
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
    }

    async function saveToLib() {
        const parent = document.getElementById('lib-parent').value;
        // تحديد المجلد الأب تلقائياً بناءً على الاختصاص
        const isMedical = ["طب العظام", "طب القلب", "طب الأعصاب", "طب الأطفال", "الجراحة العامة", "الأشعة والتشخيص", "الطب الرياضي", "طب الطوارئ", "الطب النفسي"].includes(parent);
        const folder = isMedical ? "medical_folder" : "para_folder";

        await db.collection('nihrir_data').add({
            type: document.getElementById('lib-type').value,
            name: document.getElementById('lib-name').value,
            parent: parent,
            folder: folder,
            payload: document.getElementById('lib-payload').value
        });
        alert("تم الحفظ"); location.reload();
    }

    db.collection('nihrir_data').onSnapshot(snap => {
        let h = '';
        snap.forEach(doc => {
            const d = doc.data();
            h += `<tr><td>${d.type}</td><td>${d.name}</td><td>${d.parent}</td>
            <td><button onclick="delDoc('${doc.id}')" style="background:red; color:white">حذف</button></td></tr>`;
        });
        document.getElementById('lib-body').innerHTML = h;
    });

    async function delDoc(id) { if(confirm("حذف؟")) await db.collection('nihrir_data').doc(id).delete(); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة منصة نِحرير العلمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --accent: #c5a059; --dark-bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma; background: var(--dark-bg); color: #e2e8f0; margin: 0; display: flex; }
        .sidebar { width: 280px; background: var(--card-bg); height: 100vh; position: fixed; border-left: 1px solid #334155; padding: 30px 15px; }
        .main-content { margin-right: 280px; width: calc(100% - 280px); padding: 40px; }
        .admin-card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid #334155; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: var(--accent); color: #1a237e; width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--accent); text-align: right; border-bottom: 2px solid #334155; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: #334155; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center; letter-spacing: 2px;">نِحرير ADMIN</h2>
    <hr style="border: 0.5px solid #334155; margin: 20px 0;">
    <nav>
        <div style="color:var(--accent); padding: 10px; font-weight: bold;">التحكم بالبيانات</div>
        <a href="#" class="btn-save" style="display:block; text-align:center; text-decoration:none; margin-top:10px;">إضافة محتوى جديد</a>
    </nav>
</div>

<div class="main-content">
    <div class="admin-card">
        <h3 style="margin-top:0;">إضافة مادة علمية جديدة</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <select id="type">
                <option value="category">إنشاء قسم (مجلد)</option>
                <option value="book">كتاب علمي</option>
                <option value="research">بحث / مقالة علمية</option>
            </select>
            <input type="text" id="name" placeholder="العنوان التجاري أو العلمي">
            <input type="text" id="parent" placeholder="القسم الأب (اكتب root للرئيسية)">
            <input type="text" id="payload" placeholder="رابط الملف (PDF) أو الرابط الخارجي">
        </div>
        <button class="btn-save" onclick="saveData()">اعتماد ونشر المادة</button>
    </div>

    <div class="admin-card">
        <h3>المحتوى المنشور حالياً</h3>
        <table>
            <thead><tr><th>النوع</th><th>العنوان</th><th>القسم</th><th>الإجراء</th></tr></thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveData() {
        const data = {
            type: document.getElementById('type').value,
            name: document.getElementById('name').value,
            parent: document.getElementById('parent').value || "root",
            payload: document.getElementById('payload').value,
            date: new Date().toISOString()
        };
        await db.collection('nihrir_data').add(data);
        alert("تم النشر بنجاح"); location.reload();
    }

    db.collection('nihrir_data').orderBy('date', 'desc').onSnapshot(snap => {
        let html = '';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr>
                <td><span class="tag">${d.type}</span></td>
                <td>${d.name}</td>
                <td>${d.parent}</td>
                <td><button onclick="deleteDoc('${doc.id}')" style="background:none; border:none; color:#ff4444; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
        document.getElementById('dataTable').innerHTML = html;
    });

    async function deleteDoc(id) { if(confirm("حذف؟")) await db.collection('nihrir_data').doc(id).delete(); }
</script>
</body>
</html>

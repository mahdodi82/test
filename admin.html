<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحكم الكامل - منصة نِحرير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --bg: #12141a; --card: #1e2128; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom:20px; }
        h2 { color: var(--gold); border-bottom: 1px solid #444; padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f1115; border: 1px solid #444; color: white; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--gold); color: #000; }
        .btn-user { background: #3b82f6; color: white; margin-top:5px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<h1 style="text-align:center; color:var(--gold);">لوحة تحكم نِحرير الشاملة</h1>

<div class="grid">
    <!-- إدارة الأقسام والملفات -->
    <div class="card">
        <h2><i class="fas fa-sitemap"></i> إضافة (قسم أو ملف)</h2>
        <select id="dataType">
            <option value="category">إنشاء قسم جديد (مجلد)</option>
            <option value="file">إضافة مادة علمية (رابط/ملف)</option>
        </select>
        
        <input type="text" id="itemName" placeholder="الاسم (مثلاً: طب العظام أو محاضرة الكسور)">
        <input type="text" id="itemParent" placeholder="الأب (اكتب اسم القسم الذي يتبعه، أو اتركه فارغاً للرئيسي)">
        <input type="text" id="itemPayload" placeholder="رابط الصورة (للقسم) أو رابط الملف (للمحاضرة)">
        
        <button class="btn-add" onclick="saveItem()">حفظ البيانات</button>
    </div>

    <!-- إدارة الخبراء -->
    <div class="card">
        <h2><i class="fas fa-user-md"></i> إضافة خبير</h2>
        <input type="text" id="expName" placeholder="اسم الخبير">
        <input type="text" id="expSpec" placeholder="التخصص">
        <input type="text" id="expImg" placeholder="رابط صورة الخبير">
        <input type="text" id="expEmail" placeholder="الإيميل">
        <button style="background:#10b981; color:white" onclick="saveExpert()">حفظ الخبير</button>
    </div>

    <!-- تفعيل المستخدمين الجدد -->
    <div class="card">
        <h2><i class="fas fa-users-cog"></i> طلبات التسجيل (Pending)</h2>
        <div id="pendingUsers">جاري التحميل...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // حفظ قسم أو ملف
    async function saveItem() {
        const type = document.getElementById('dataType').value;
        const name = document.getElementById('itemName').value;
        const parent = document.getElementById('itemParent').value || "root";
        const payload = document.getElementById('itemPayload').value;

        if(!name) return alert("الاسم مطلوب");

        await db.collection('nihrir_data').add({
            type, name, parent, payload,
            createdAt: new Date()
        });
        alert("تم الحفظ بنجاح");
        location.reload();
    }

    // حفظ خبير
    async function saveExpert() {
        await db.collection('experts').add({
            name: document.getElementById('expName').value,
            spec: document.getElementById('expSpec').value,
            image: document.getElementById('expImg').value,
            email: document.getElementById('expEmail').value
        });
        alert("تم حفظ الخبير");
    }

    // إدارة المستخدمين
    db.collection('users').where('status', '==', 'pending').onSnapshot(snap => {
        let h = '';
        snap.forEach(doc => {
            const u = doc.data();
            h += `<div class="user-row">
                <span>${u.name}</span>
                <button class="btn-user" onclick="activateUser('${doc.id}')">تفعيل</button>
            </div>`;
        });
        document.getElementById('pendingUsers').innerHTML = h || 'لا توجد طلبات معلقة';
    });

    async function activateUser(id) {
        await db.collection('users').doc(id).update({ status: 'active' });
        alert("تم تفعيل المستخدم");
    }
</script>
</body>
</html>

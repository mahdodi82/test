<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحكم الكامل - منصة نِحرير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --bg: #12141a; --card: #1e2128; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h2 { color: var(--gold); border-bottom: 1px solid #444; padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f1115; border: 1px solid #444; color: white; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--gold); color: #000; }
        .btn-expert { background: #10b981; color: white; }
        .section-tag { background: #333; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; margin: 2px; display: inline-block; }
    </style>
</head>
<body>

<h1 style="text-align:center; color:var(--gold);">لوحة التحكم الشاملة (نظام الأقسام المتداخلة)</h1>

<div class="grid">
    <!-- إضافة الأقسام -->
    <div class="card">
        <h2><i class="fas fa-folder-plus"></i> إنشاء قسم جديد</h2>
        <input type="text" id="catName" placeholder="اسم القسم (مثلاً: المفاصل)">
        <input type="text" id="catParent" placeholder="اسم القسم الأب (اتركه فارغاً إذا كان قسماً رئيسياً)">
        <input type="text" id="catImg" placeholder="رابط صورة القسم (URL)">
        <textarea id="catDesc" placeholder="وصف القسم..."></textarea>
        <button class="btn-add" onclick="saveCategory()">حفظ القسم</button>
    </div>

    <!-- إضافة الملفات والروابط -->
    <div class="card">
        <h2><i class="fas fa-link"></i> إضافة ملف/رابط داخل قسم</h2>
        <input type="text" id="fileName" placeholder="عنوان المادة العلمية">
        <input type="text" id="fileLink" placeholder="رابط (Drive, YouTube, PDF)">
        <select id="fileParentSelect">
            <option value="">جاري تحميل الأقسام...</option>
        </select>
        <button class="btn-add" onclick="saveFile()">إضافة المادة</button>
    </div>

    <!-- إضافة الخبراء -->
    <div class="card">
        <h2><i class="fas fa-user-md"></i> إضافة خبير</h2>
        <input type="text" id="expName" placeholder="اسم الخبير">
        <input type="text" id="expSpec" placeholder="التخصص">
        <input type="text" id="expImg" placeholder="رابط صورة الخبير (URL)">
        <input type="text" id="expEmail" placeholder="الإيميل">
        <button class="btn-expert" onclick="saveExpert()">حفظ الخبير</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. حفظ القسم (يدعم التداخل عبر اسم الأب)
    async function saveCategory() {
        const name = document.getElementById('catName').value;
        const parent = document.getElementById('catParent').value || "root";
        if(!name) return alert("الاسم مطلوب");

        await db.collection('library_structure').add({
            type: 'category',
            name: name,
            parent: parent,
            image: document.getElementById('catImg').value || "https://via.placeholder.com/150",
            description: document.getElementById('catDesc').value,
            createdAt: new Date()
        });
        alert("تم حفظ القسم بنجاح");
        location.reload();
    }

    // 2. حفظ الملفات داخل الأقسام
    async function saveFile() {
        const name = document.getElementById('fileName').value;
        const parent = document.getElementById('fileParentSelect').value;
        if(!name || !parent) return alert("أكمل البيانات");

        await db.collection('library_structure').add({
            type: 'file',
            name: name,
            link: document.getElementById('fileLink').value,
            parent: parent,
            createdAt: new Date()
        });
        alert("تمت إضافة المادة العلمية");
    }

    // جلب الأقسام للقائمة المنسدلة
    db.collection('library_structure').where('type', '==', 'category').onSnapshot(snap => {
        let options = '<option value="">اختر القسم المستهدف...</option>';
        snap.forEach(doc => {
            options += `<option value="${doc.data().name}">${doc.data().name}</option>`;
        });
        document.getElementById('fileParentSelect').innerHTML = options;
    });

    // 3. حفظ الخبراء
    async function saveExpert() {
        await db.collection('experts').add({
            name: document.getElementById('expName').value,
            spec: document.getElementById('expSpec').value,
            image: document.getElementById('expImg').value,
            email: document.getElementById('expEmail').value
        });
        alert("تم حفظ الخبير");
        location.reload();
    }
</script>
</body>
</html>
